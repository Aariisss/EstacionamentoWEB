<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="global-login.css">
    <title>Cadastro</title>
</head>
<script src="login.js"></script>
<body>
    <div class="caixa">

        <h1>Cadastro</h1>

        <div class="campo">
            <label for="usuario"></label>
            <input type="usuario" id="usuario" placeholder="Nome de usuário" maxlength="20" required>
        </div>
        <div class="campo">
            <label for="senha"></label>
            <input type="password" id="senha" placeholder="Senha" maxlength="35" required>
        </div>
        <div class="campo">
            <label for="confirmar-senha"></label>
            <input type="password" id="confirmar-senha" placeholder="Confirmar senha" maxlength="35" required>
        </div>

        <button class="btn-confirmar" type="button">Confirmar</button>

        <div class="rodape">
            <a href="#">Ja possui uma conta?</a>            
        </div>
    </div>
    
</body>
</html>
