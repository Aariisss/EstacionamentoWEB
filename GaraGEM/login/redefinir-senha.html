<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="global-login.css">
</head>
<script src="login.js"></script>
<body>
    <div class="caixa-email">
        <h1>Digite a nova senha</h1>

        <div class="campo">
            <label for="senha"></label>
            <input type="password" id="senha" placeholder="Senha" maxlength="35" required>
        </div>
        <div class="campo">
            <label for="confirmar-senha"></label>
            <input type="password" id="confirmar-senha" placeholder="Confirmar senha" maxlength="35" required>
        </div>

        <button class="btn-next" type="button"><img src="assets/seta.png" alt="seta"></button>
    </div>
    
</body>
</html>
