<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="global-login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <title>GaraGEM</title>
</head>
<script src="login.js"></script>
<body>
    <div class="caixa">
        <header class="caixa-header">
            <h2>GaraGEM<i class="fa-regular fa-gem" style="color: rgb(116, 192, 252);"></i></h2>
        </header>

        <h1>Cadastro</h1>

        <div class="campo">
            <label for="usuario"></label>
            <input type="usuario" id="usuario" placeholder="Nome de usuário" maxlength="20" required>
        </div>
        <div class="campo">
            <label for="senha"></label>
            <input type="password" id="senha" placeholder="Senha" maxlength="35" required>
        </div>
        <div class="campo">
            <label for="confirmar-senha"></label>
            <input type="password" id="confirmar-senha" placeholder="Confirmar senha" maxlength="35" required>
        </div>

        <button class="btn-confirmar" type="button">Confirmar</button>

        <div class="rodape">
            <a href="#">Ja possui uma conta?</a>            
        </div>
    </div>
    
</body>
</html>
