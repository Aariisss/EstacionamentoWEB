<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="global-login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <title>Estacionamento Virtual</title>
</head>
<script src="login.js"></script>
<body>
    <div class="caixa">
        <header class="caixa-header">
            <h2>GaraGEM<i class="fa-regular fa-gem" style="color: rgb(116, 192, 252);"></i></h2>
        </header>
        <h1>Login</h1>
        
        <div class="campo">
            <label for="email"></label>
            <input type="email" id="email" placeholder="Email" maxlength="35" required>
        </div>
        <div class="campo">
            <label for="senha"></label>
            <input type="password" id="senha" placeholder="Senha" maxlength="35" required>
        </div>
        <div class="manter-logado">
            <input type="checkbox" id="manter">
            <label for="manter">Manter Login</label>
        </div>

        <button class="btn-login" type="button">Entrar</button>

        <div class="rodape">
            <a href="#">Esqueceu sua senha?</a>            
            <a href="#">Cadastre-se</a>
        </div>
        
    </div>
    
</body>
</html>
