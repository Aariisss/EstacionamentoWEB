{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GaraGEM — Cadastro</title>
    <link rel="stylesheet" href="{% static 'core/css/login/global-login.css' %}">
    <link rel="stylesheet" href="{% static 'core/css/login/mobile-login.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
          integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
          crossorigin="anonymous" referrerpolicy="no-referrer">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <div class="caixa">
        <header class="caixa-header">
            <h2>GaraGEM<i class="fa-regular fa-gem" style="color:rgb(116,192,252);"></i></h2>
        </header>
        <h1>Cadastro</h1>

        <div class="campo">
            <input type="text" id="usuario" placeholder="Nome de usuário" maxlength="20" required>
        </div>
        <div class="campo">
            <input type="password" id="senha" placeholder="Senha" maxlength="35" required>
        </div>
        <div class="campo">
            <input type="password" id="confirmar-senha" placeholder="Confirmar senha" maxlength="35" required>
        </div>

        <button class="btn-confirmar" type="button" id="btn-confirmar">Confirmar</button>

        <div class="rodape">
            <a href="{% url 'login' %}">Já possui uma conta?</a>
        </div>
    </div>

    <script>
        document.getElementById('btn-confirmar').addEventListener('click', function () {
            const senha    = document.getElementById('senha').value;
            const confirma = document.getElementById('confirmar-senha').value;
            if (senha !== confirma) {
                Swal.fire({ icon: 'error', title: 'As senhas não coincidem.' });
                return;
            }
            Swal.fire({ icon: 'success', title: 'Conta criada!', timer: 1500, showConfirmButton: false })
                .then(() => window.location.href = "{% url 'login' %}");
        });
    </script>
</body>
</html>
