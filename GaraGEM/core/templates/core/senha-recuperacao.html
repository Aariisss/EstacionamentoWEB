{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GaraGEM — Recuperação de Senha</title>
    <link rel="stylesheet" href="{% static 'core/css/login/global-login.css' %}">
    <link rel="stylesheet" href="{% static 'core/css/login/mobile-login.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
          integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
          crossorigin="anonymous" referrerpolicy="no-referrer">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <div class="caixa-email">
        <header class="caixa-header">
            <h2>GaraGEM<i class="fa-regular fa-gem" style="color:rgb(116,192,252);"></i></h2>
        </header>
        <h1>Redefinir senha</h1>
        <h2>Enviaremos um código no seu email para recuperação da conta.</h2>

        <div class="campo">
            <input type="email" id="email" placeholder="Email" maxlength="35" required>
        </div>

        <button class="btn-next" type="button" id="btn-enviar">
            <img src="{% static 'core/login/assets/seta.png' %}" alt="seta">
        </button>
    </div>

    <script src="{% static 'core/js/login.js' %}"></script>
    <script>
        document.getElementById('btn-enviar').addEventListener('click', function () {
            const email = document.getElementById('email').value.trim();
            if (!email) {
                Swal.fire({ icon: 'warning', title: 'Preencha o e-mail.' });
                return;
            }
            window.location.href = "{% url 'confirmacao_email' %}";
        });
    </script>
</body>
</html>
