<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="global-login.css">
    <title>Estacionamento Virtual</title>
</head>
<script src="login.js"></script>
<body>
    <div class="caixa">

        <h1>Login</h1>
        
        <div class="campo">
            <label for="email"></label>
            <input type="email" id="email" placeholder="Email" maxlength="35" required>
        </div>
        <div class="campo">
            <label for="senha"></label>
            <input type="password" id="senha" placeholder="Senha" maxlength="35" required>
        </div>
        <div class="manter-logado">
            <input type="checkbox" id="manter">
            <label for="manter">Manter Login</label>
        </div>

        <button class="btn-login" type="button">Entrar</button>

        <div class="rodape">
            <a href="#">Esqueceu sua senha?</a>            
            <a href="#">Cadastre-se</a>
        </div>
        
    </div>
    
</body>
</html>
